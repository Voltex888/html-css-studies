<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula sobre form select</title>
</head>
<body>
    <h1>Aula sobre form Select</h1>
    <form >
        <label for="niveis">Níveis de acesso</label>
        <select name="niveis_acessos" id="niveisAcesso">
            <option value="">Selecione um campo</option>
            <option value="01">Administrador</option>
            <option value="02">Finaceiro</option>
            <option value="03">Recursos Humanos</option>
            <option value="04">Tesouraria</option>
            <option value="05">Vendedor</option>
            <option value="06">Marketing</option>
            <option value="07">Desenvolvedor</option>
        </select><br><br>

        <input type="submit" value="Cadastrar">
    </form>
</body>
</html>
